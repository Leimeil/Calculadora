<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body style="background-color: darkgrey;">
    <h1 style="color:white; text-align: center;">
        CALCULADORA
    </h1>
    <div class="big-box">
        <div class="main-container">
            <div class="main-screen" id="screen"></div>
            <div class="btn-container">
                <button class="btn" onclick="handleClick('.')">.</button>
                <button class="btn" onclick="handleClick('^')">^</button>
    
            </div>
            <div class="btn-container">
                <button class="btn" onclick="handleClick(1)">1</button>
                <button class="btn" onclick="handleClick(2)">2</button>
                <button class="btn" onclick="handleClick(3)">3</button>
                <button class="btn" onclick="handleClick('+')">+</button>
    
            </div>
            <div class="btn-container">
                <button class="btn" onclick="handleClick(4)">4</button>
                <button class="btn" onclick="handleClick(5)">5</button>
                <button class="btn" onclick="handleClick(6)">6</button>
                <button class="btn" onclick="handleClick('-')">-</button>
    
            </div>
            <div class="btn-container">
            <button class="btn" onclick="handleClick(7)">7</button>
                <button class="btn" onclick="handleClick(8)">8</button>
                <button class="btn" onclick="handleClick(9)">9</button>
                <button class="btn" onclick="handleClick('x')">x</button>
            </div>
            <div class="btn-container">
                <button class="btn" onclick="handleClick(0)">0</button>
                <button class="btn" onclick="handleClick('/')">/</button>
                <button class="btn-equal" onclick="calculate('=')">=</button>
                <button class="btn" onclick="delentry('CE')">CE</button>
            </div>
        </div>
        <div class="side-container">
            <div id="history"></div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
